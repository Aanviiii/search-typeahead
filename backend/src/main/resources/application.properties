# (1) Server port
server.port=8080

# (2) SQLite datasource
# busy_timeout: a blocked writer waits for the lock instead of failing with
# SQLITE_BUSY (the bulk loader and the batch-write scheduler both write).
# WAL: lets reads proceed during writes. synchronous=NORMAL: faster bulk load.
spring.datasource.url=jdbc:sqlite:/app/data/typeahead.db?busy_timeout=60000&journal_mode=WAL&synchronous=NORMAL
spring.datasource.driver-class-name=org.sqlite.JDBC

# (3) JPA / Hibernate settings
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# (4) Dataset file path
app.dataset.path=/app/dataset/queries.csv
app.dataset.sample-path=/app/dataset/sample_queries.csv

# (5) Batch write configuration
app.batch.flush-interval-ms=10000
app.batch.max-queue-size=10000

# (6) Cache configuration
app.cache.nodes=3
app.cache.virtual-nodes=150
app.cache.ttl-seconds=60

# (7) Trending configuration
app.trending.historical-weight=0.7
app.trending.recent-weight=0.3
app.trending.top-n=10

# (8) Logging
logging.level.com.typeahead=INFO
logging.level.org.hibernate.SQL=WARN