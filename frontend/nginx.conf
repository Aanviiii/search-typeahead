server {
    listen 3000;
    server_name localhost;

    # (1) Serve the React app's static files
    root /usr/share/nginx/html;
    index index.html;

    # (2) SPA routing fallback — if a route doesn't match a real file,
    # serve index.html and let React Router (if used) handle it client-side.
    # For our single-page app without routing, this just ensures refresh
    # on any path doesn't 404.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # (3) Proxy /api/* requests to the backend Docker service.
    # This replaces the Vite dev-server proxy for the production build —
    # the frontend code still calls /api/suggest, etc., unchanged.
    location /api/ {
        # (4) "backend" is the Docker Compose service name —
        # Docker's internal DNS resolves it to the backend container's IP
        proxy_pass http://backend:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # (5) Gzip compression for faster loading
    gzip on;
    gzip_types text/css application/javascript application/json;
}